name: Testes + Publicar Relatório

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Executar Testes e Publicar Relatório
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes
        run: npm test
        continue-on-error: true

      - name: Garantir que a pasta reports existe
        run: |
          mkdir -p reports
          if [ ! -f reports/test-report.html ]; then
            echo "<html><body><h1>Nenhum relatório gerado</h1><p>Os testes podem ter falhado antes de gerar o relatório.</p></body></html>" > reports/index.html
          else
            cp reports/test-report.html reports/index.html
          fi

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload do relatório como artefato de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Exibir URL do relatório
        run: echo "Relatório publicado em ${{ steps.deployment.outputs.page_url }}"